<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_title }}</title>
</head>
<body>
    <h1>Welcome to {{ project_title }}!</h1>
    <p>Status: <strong>{{ app_status }}</strong></p>
    
    <hr>

    <h3>Core Features Coming Soon:</h3>
    <ul>
        <!-- Jinja2 For Loop to display dynamic lists from Python -->
        {% for feature in features %}
            <li>{{ feature }}</li>
        {% endfor %}
    </ul>
</body>
</html>
